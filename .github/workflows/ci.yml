name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker image
        run: docker build -t noteplatform:ci .

      - name: Docker Compose up
        run: docker compose up --build -d

      - name: Check application health
        run: |
          # Wait for the application to be healthy
          for i in {1..10}; do
            echo "Checking application health (attempt $i)..."
            if curl -f http://localhost:8000/health; then
              echo "Application is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Application is not healthy"
          exit 1

      - name: Check application readiness
        run: |
          # Wait for the application to be ready
          for i in {1..10}; do
            echo "Checking application readiness (attempt $i)..."
            if curl -f http://localhost:8000/ready; then
              echo "Application is ready"
              exit 0
            fi
            sleep 3
          done
          echo "Application is not ready"
          exit 1

      - name: Business smoke test
        run: |
          # Perform a simple business smoke test
          echo "Starting business smoke test..."

          echo "Creating category..."
          category_response=$(curl -f -X POST http://localhost:8000/api/categories -H "Content-Type: application/json" -d '{"name": "CI-Test-Category"}')
          
          echo "Checking category response..."
          if [[ $(echo "$category_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print(data['name'])") == "CI-Test-Category" ]]; then
            echo "Category created successfully"
          else
            echo "Failed to create category"
            exit 1
          fi
          category_id=$(echo "$category_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print(data['id'])")
          if [[ -z "$category_id" || "$category_id" == "null" ]]; then
            echo "Failed to retrieve category ID"
            exit 1
          fi

          echo "Creating note..."
          note_response=$(curl -f -X POST http://localhost:8000/api/notes -H "Content-Type: application/json" -d "{\"title\": \"CI-Test-note\", \"content\": \"This is a test note for CI.\", \"category_id\": $category_id}")

          echo "Checking note response..."
          if [[ $(echo "$note_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print(data['title'])") == "CI-Test-note" ]]; then
            echo "Note created successfully"
          else
            echo "Failed to create note"
            exit 1
          fi

          echo "Listing notes..."
          notes_response=$(curl -f http://localhost:8000/api/notes)

          echo "Checking notes list..."
          notes_check=$(echo "$notes_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print('found' if any(note.get('title') == 'CI-Test-note' for note in data) else 'not_found')")
          if [[ "$notes_check" == "found" ]]; then
            echo "Notes listed successfully"
          else
            echo "Failed to list notes"
            exit 1
          fi

          echo "Business smoke test passed"

      - name: Print Logs when failing
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Shutdown Docker Compose
        if: always()
        run: docker compose down
