name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker image
        run: docker build -t noteplatform:ci .

      - name: Generate self-signed certificate for CI
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout certs/server.key -out certs/server.crt \
            -days 365 -subj "/CN=localhost"

      - name: Docker Compose up
        run: docker compose up --build -d

      - name: Check application health
        run: |
          # Wait for the application to be healthy
          for i in {1..10}; do
            echo "Checking application health (attempt $i)..."
            if curl -f -k https://localhost/health; then
              echo "Application is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Application is not healthy"
          exit 1

      - name: Check application readiness
        run: |
          # Wait for the application to be ready
          for i in {1..10}; do
            echo "Checking application readiness (attempt $i)..."
            if curl -f -k https://localhost/ready; then
              echo "Application is ready"
              exit 0
            fi
            sleep 3
          done
          echo "Application is not ready"
          exit 1

      - name: Business smoke test
        run: |
          # Perform a simple business smoke test
          echo "Starting business smoke test..."

          echo "Creating category..."
          category_response=$(curl -f -k -X POST https://localhost/api/categories -H "Content-Type: application/json" -d '{"name": "CI-Test-Category"}')
          
          echo "Checking category response..."
          if [[ $(echo "$category_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print(data['name'])") == "CI-Test-Category" ]]; then
            echo "Category created successfully"
          else
            echo "Failed to create category"
            exit 1
          fi
          category_id=$(echo "$category_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print(data['id'])")
          if [[ -z "$category_id" || "$category_id" == "null" ]]; then
            echo "Failed to retrieve category ID"
            exit 1
          fi

          echo "Creating note..."
          note_response=$(curl -f -k -X POST https://localhost/api/notes -H "Content-Type: application/json" -d "{\"title\": \"CI-Test-note\", \"content\": \"This is a test note for CI.\", \"category_id\": $category_id}")
          note_id=$(echo "$note_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print(data['id'])")
          
          echo "Checking note response..."
          if [[ $(echo "$note_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print(data['title'])") == "CI-Test-note" ]]; then
            echo "Note created successfully"
          else
            echo "Failed to create note"
            exit 1
          fi

          echo "Listing notes..."
          notes_response=$(curl -f -k https://localhost/api/notes)

          echo "Checking notes list..."
          notes_check=$(echo "$notes_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print('found' if any(note.get('title') == 'CI-Test-note' for note in data) else 'not_found')")
          if [[ "$notes_check" == "found" ]]; then
            echo "Notes listed successfully"
          else
            echo "Failed to list notes"
            exit 1
          fi

          echo "Updating note..."
          update_response=$(curl -f -k -X PUT https://localhost/api/notes/$note_id -H "Content-Type: application/json" -d "{\"title\": \"CI-Test-note-updated\", \"content\": \"Updated by CI.\", \"category_id\": $category_id}")

          echo "Checking update response..."
          if [[ $(echo "$update_response" | python -c "import sys, json; data=json.loads(sys.stdin.read()); print(data['title'])") == "CI-Test-note-updated" ]]; then
            echo "Note updated successfully"
          else
            echo "Failed to update note"
            exit 1
          fi

          echo "Deleting category while note still exists..."
          delete_category_status=$(curl -s -o delete_category_response.txt -w "%{http_code}" -k -X DELETE https://localhost/api/categories/$category_id)

          echo "Checking delete category conflict..."
          if [[ "$delete_category_status" == "409" ]]; then
            echo "Category deletion correctly blocked"
          else
            echo "Expected 409 but got $delete_category_status"
            cat delete_category_response.txt
            exit 1
          fi

          echo "Deleting note..."
          delete_note_status=$(curl -s -o delete_note_response.txt -w "%{http_code}" -k -X DELETE https://localhost/api/notes/$note_id)

          echo "Checking note deletion..."
          if [[ "$delete_note_status" == "200" ]]; then
            echo "Note deleted successfully"
          else
            echo "Expected 200 but got $delete_note_status"
            cat delete_note_response.txt
            exit 1
          fi

          echo "Deleting category after note deletion..."
          delete_category_after_note_status=$(curl -s -o delete_category_after_note_response.txt -w "%{http_code}" -k -X DELETE https://localhost/api/categories/$category_id)

          echo "Checking category deletion after note deletion..."
          if [[ "$delete_category_after_note_status" == "200" ]]; then
            echo "Category deleted successfully after note deletion"
          else
            echo "Expected 200 but got $delete_category_after_note_status"
            cat delete_category_after_note_response.txt
            exit 1
          fi

          echo "Checking deleted note..."
          check_deleted_note_status=$(curl -s -o check_deleted_note_response.txt -w "%{http_code}" -k https://localhost/api/notes/$note_id)
          if [[ "$check_deleted_note_status" == "404" ]]; then
            echo "Deleted note correctly returns 404"
          else
            echo "Expected 404 but got $check_deleted_note_status"
            cat check_deleted_note_response.txt
            exit 1
          fi

          echo "Business smoke test passed"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print Logs when failing
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Shutdown Docker Compose
        if: always()
        run: docker compose down
