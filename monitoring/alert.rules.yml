groups:
  - name: noteplatform-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "监控目标 {{ $labels.instance }} 掉线了"
          description: "{{ $labels.job }} 的实例 {{ $labels.instance }} 已经无法抓取超过 1 分钟"

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{http_status=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "5xx 错误率过高"
          description: "过去5分钟 5xx 错误率为 {{ $value | humanizePercentage }}，已超过 5% 阈值"