route:
  receiver: 'default-receiver'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = "critical"
      receiver: 'critical-receiver'
    - matchers:
        - severity = "warning"
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'https://webhook.site/b626637a-c801-468f-ba60-3d9a8b49e785'
        send_resolved: true
  - name: 'critical-receiver'
    webhook_configs:
      - url: 'https://webhook.site/b626637a-c801-468f-ba60-3d9a8b49e785'
        send_resolved: true
  - name: 'warning-receiver'
    webhook_configs:
      - url: 'https://webhook.site/4c8b3e92-7ced-4681-8c9a-d0f70b9f792f'
        send_resolved: true