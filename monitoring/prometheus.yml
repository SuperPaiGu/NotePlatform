global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'web'
    static_configs:
      - targets: ['web:5000']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']