apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:latest
          args: ['--path.rootfs=/host']
          ports:
            - containerPort: 9100
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
      hostPID: true
      volumes:
        - name: host-root
          hostPath:
            path: /