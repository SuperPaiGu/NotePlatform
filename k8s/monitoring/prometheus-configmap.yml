apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
    rule_files:
      - '/etc/prometheus/alert.rules.yml'
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
  alert.rules.yml: |
    groups:
      - name: noteplatform-alerts
        rules:
          - alert: InstanceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "监控目标 {{ $labels.instance }} 掉线了"
              description: "{{ $labels.job }} 的实例 {{ $labels.instance }} 已经无法抓取超过 1 分钟"
          - alert: HighErrorRate
            expr: sum(rate(http_requests_total{http_status=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) > 0.01 and sum(rate(http_requests_total[5m])) > 0.2
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "5xx 错误率过高"
              description: "过去5分钟 5xx 错误率为 {{ $value | humanizePercentage }}, 已超过 1% 阈值"
          - alert: HighLatency
            expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "P95 延迟过高"
              description: "过去5分钟 P95 延迟为 {{ $value | humanizeDuration }}, 已超过 500ms 阈值"