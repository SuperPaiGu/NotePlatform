apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    route:
      receiver: 'default-receiver'
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'critical-receiver'
        - matchers:
            - severity = "warning"
          receiver: 'warning-receiver'
    receivers:
      - name: 'default-receiver'
        webhook_configs:
          - url: 'http://dingtalk-webhook:5000/dingtalk'
            send_resolved: true
      - name: 'critical-receiver'
        webhook_configs:
          - url: 'http://dingtalk-webhook:5000/dingtalk'
            send_resolved: true
      - name: 'warning-receiver'
        webhook_configs:
          - url: 'http://dingtalk-webhook:5000/dingtalk'
            send_resolved: true